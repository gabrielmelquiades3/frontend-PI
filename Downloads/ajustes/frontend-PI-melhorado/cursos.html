<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciar Cursos</title>
  <link rel="stylesheet" href="global.css" />
</head>
<body>

  <div class="header">
    <h1>Gerenciar Cursos</h1>
    <a href="dashbord.html">Voltar</a>
  </div>

  <div class="content">

    <!-- Formulário novo curso -->
    <div class="card">
      <h2>Novo Curso</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Nome do Curso</label>
          <input type="text" id="nome" placeholder="Ex: Engenharia de Software" />
        </div>
        <div class="form-group">
          <label>Meta de Horas</label>
          <input type="number" id="cargaHorariaTotal" placeholder="Ex: 200" min="1" />
        </div>
      </div>
      <p id="msg-curso" style="margin-bottom:10px; font-size:0.9rem;"></p>
      <button class="btn btn-primary" id="btn-criar">Criar Curso</button>
    </div>

    <!-- Lista de cursos -->
    <div id="lista-cursos">
      <p style="text-align:center; color:#888;">Carregando cursos...</p>
    </div>

  </div>

  <div class="modal-overlay" id="modal-editar">
    <div class="modal">
      <div class="modal-header">
        <h2>Editar Curso</h2>
        <button class="modal-fechar" onclick="fecharModal()">×</button>
      </div>
      <div class="form-grid" style="margin-top:10px;">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="edit-nome" />
        </div>
        <div class="form-group">
          <label>Meta de Horas</label>
          <input type="number" id="edit-horas" min="1" />
        </div>
      </div>
      <input type="hidden" id="edit-id" />
      <p id="msg-edit" style="font-size:0.9rem; margin-bottom:8px;"></p>
      <button class="btn btn-primary" style="width:100%" onclick="salvarEdicao()">Salvar Alterações</button>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    async function carregarCursos() {
      const container = document.getElementById('lista-cursos');
      try {
        const lista = await cursos.listar();
        if (lista.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:#888;">Nenhum curso cadastrado.</p>';
          return;
        }
        container.innerHTML = lista.map(c => `
          <div class="list-item">
            <div class="list-item-info">
              <h3>${c.nome}</h3>
              <p>Meta de Horas: ${c.cargaHorariaTotal}h &nbsp;·&nbsp; Alunos: ${c.totalAlunos} &nbsp;·&nbsp; Status: ${c.status}</p>
            </div>
            <div class="btn-group">
              <button class="btn btn-primary" onclick="abrirEdicao(${c.id}, '${c.nome}', ${c.cargaHorariaTotal})">Editar</button>
              <button class="btn btn-secondary" onclick="excluirCurso(${c.id})">Excluir</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = '<p style="text-align:center;color:red;">Erro ao carregar cursos.</p>';
      }
    }

    document.getElementById('btn-criar').addEventListener('click', async function() {
      const msg = document.getElementById('msg-curso');
      const dados = {
        nome: document.getElementById('nome').value.trim(),
        cargaHorariaTotal: parseInt(document.getElementById('cargaHorariaTotal').value)
      };

      if (!dados.nome || !dados.cargaHorariaTotal) {
        msg.textContent = 'Preencha todos os campos.';
        msg.style.color = 'red';
        return;
      }

      this.textContent = 'Criando...';
      this.disabled = true;
      try {
        await cursos.criar(dados);
        msg.textContent = 'Curso criado com sucesso!';
        msg.style.color = 'green';
        document.getElementById('nome').value = '';
        document.getElementById('cargaHorariaTotal').value = '';
        carregarCursos();
      } catch (err) {
        msg.textContent = err.message;
        msg.style.color = 'red';
      }
      this.textContent = 'Criar Curso';
      this.disabled = false;
    });

    function abrirEdicao(id, nome, horas) {
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-nome').value = nome;
      document.getElementById('edit-horas').value = horas;
      document.getElementById('msg-edit').textContent = '';
      document.getElementById('modal-editar').classList.add('aberto');
    }

    function fecharModal() {
      document.getElementById('modal-editar').classList.remove('aberto');
    }

    async function salvarEdicao() {
      const id = document.getElementById('edit-id').value;
      const msg = document.getElementById('msg-edit');
      const dados = {
        nome: document.getElementById('edit-nome').value.trim(),
        cargaHorariaTotal: parseInt(document.getElementById('edit-horas').value)
      };
      try {
        await cursos.editar(id, dados);
        msg.textContent = 'Atualizado!';
        msg.style.color = 'green';
        fecharModal();
        carregarCursos();
      } catch (err) {
        msg.textContent = err.message;
        msg.style.color = 'red';
      }
    }

    async function excluirCurso(id) {
      if (!confirm('Excluir este curso?')) return;
      try {
        await cursos.excluir(id);
        carregarCursos();
      } catch (err) {
        alert('Erro: ' + err.message);
      }
    }

    carregarCursos();
  </script>

</body>
</html>
