<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="global.css">
    <title>Minha Área - Aluno</title>
</head>
<body>
    <div class="container">
        <h1>Painel do Aluno</h1>
        <a href="index.html" style="text-decoration: none; color: #666;">← Voltar ao Início</a>

        
        <div class="card" style="margin-top: 20px; padding: 20px; border: 1px solid #ccc;">
            <h3>Submeter Nova Atividade</h3>
            <form style="display: flex; flex-direction: column; gap: 15px;">
                <input type="text" placeholder="Título da Atividade (ex: Palestra de Inovação)" required>
                
                <div style="display: flex; gap: 10px;">
                    <input type="number" placeholder="Carga Horária" style="flex: 1;">
                    <input type="date" title="Data de Realização" style="flex: 1;">
                </div>

                <select>
                    <option value="">Selecione a Categoria</option>
                    <option value="1">Extensão</option>
                    <option value="2">Pesquisa</option>
                    <option value="3">Ensino</option>
                </select>

                <textarea placeholder="Breve descrição da atividade" rows="3"></textarea>
                
                <label>Upload do Comprovante (PDF/Imagem):</label>
                <input type="file">

                <button type="button" onclick="alert('Atividade enviada com sucesso!')" 
                        style="background-color: #28a745; color: white; border: none; padding: 10px; cursor: pointer;">
                    Enviar para Avaliação
                </button>
            </form>
        </div>

        
        <div class="card" style="margin-top: 20px; padding: 20px; border: 1px solid #ccc;">
            <h3>Minhas Atividades Submetidas</h3>
            <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                <thead style="background-color: #f4f4f4;">
                    <tr>
                        <th>Título</th>
                        <th>Horas</th>
                        <th>Data Envio</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Curso de Python Avançado</td>
                        <td>40h</td>
                        <td>04/05/2026</td>
                        <td style="color: #d39e00; font-weight: bold;">Pendente</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
